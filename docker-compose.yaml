version: '3.9'

services:
  db:
    container_name: zerodotemail-db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zerodotemail}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    container_name: zerodotemail-redis
    image: docker.io/bitnami/valkey:8.0
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - VALKEY_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - 6378:6378
    volumes:
      - valkey-data:/bitnami/valkey/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  upstash-proxy:
    container_name: zerodotemail-upstash-proxy
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${REDIS_TOKEN:-upstash-local-token}
      SRH_CONNECTION_STRING: 'redis://valkey:6378'
    ports:
      - 8079:80
    depends_on:
      valkey:
        condition: service_healthy

  web:
    container_name: zerodotemail-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - ${PORT:-3000}:3000
    depends_on:
      db:
        condition: service_healthy
      upstash-proxy:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-zerodotemail}
      REDIS_URL: http://upstash-proxy:80
      REDIS_TOKEN: ${REDIS_TOKEN:-upstash-local-token}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-X1v2b9cFzUYDMfgRpUFkfrUOArq61AD8}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      SERVICE_FQDN: ${SERVICE_FQDN}
    # No volumes for production deployments with Coolify
    labels:
      coolify.enable: "true"

volumes:
  valkey-data:
    driver: local
  postgres-data:
    driver: local
